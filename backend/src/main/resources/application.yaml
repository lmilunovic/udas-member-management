spring:
  application:
    name: udas-member-management
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        default_schema: public
  flyway:
    enabled: true

app:
  name: "udas-member-management"
  version: "v1"
  api:
    prefix: "/api/v1"
    page-size-default: 20
    page-size-max: 100
  security:
    allowed-domain: "your-org.com"
  admin:
    email: ${ADMIN_EMAIL:}
  frontend-url: ${FRONTEND_URL:http://localhost:5173}
